name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare static output
        run: |
          mkdir -p _site/brand_assets/brand_assets
          cp Website/index.html _site/index.html
          cp -r Website/brand_assets/brand_assets/. _site/brand_assets/brand_assets/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
